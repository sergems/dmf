kind = "api"
previewPath = "/"
title = "Divine Mercy Foundation"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 5000
name = "API Server"
paths = ["/"]

[services.development]
run = "cd /home/runner/workspace/divine-mercy-foundation && PREVIEW_MODE=1 php -S 0.0.0.0:$PORT"

[services.production]

[services.production.build]
args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.run.env]
PORT = "5000"
NODE_ENV = "production"
